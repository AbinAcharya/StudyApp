<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - A X I S</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><style>@keyframes scanLine { 0%, 100% { transform: translateY(0px); opacity: 0.2; } 50% { transform: translateY(60px); opacity: 1; } }</style><text x=%2250%%22 y=%2255%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2285%22 font-family=%22sans-serif%22 font-weight=%22900%22 fill=%22%236366f1%22 opacity=%220.2%22>A</text><g><text x=%2250%%22 y=%2255%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2285%22 font-family=%22sans-serif%22 font-weight=%22900%22 fill=%22%236366f1%22>A</text><rect x=%2215%22 y=%2220%22 width=%2270%22 height=%228%22 rx=%224%22 fill=%22%236366f1%22 style=%22animation: scanLine 2s ease-in-out infinite;%22/></g></svg>">

    <script>
        if (localStorage.getItem('theme') === 'oled') {
            document.documentElement.setAttribute('data-theme', 'oled');
        }
    </script>
</head>
<body>
    <div class="container" style="padding: 2.5rem; position: relative;">
        
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; padding: 1rem 0; border-bottom: 1px solid var(--border-color);">
            <h1 style="margin: 0; font-family: 'Arimo', sans-serif; font-size: 2.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5rem; font-weight: 900;">
                AXIS
            </h1>
            <nav style="display: flex; gap: 2.5rem; margin-top: 0.5rem; align-items: center;">
                <a href="/" style="text-decoration: none; font-weight: 700; color: var(--primary); font-size: 1.1rem;">
                    INDEX
                </a>
                <a href="/dashboard" style="text-decoration: none; font-weight: 700; color: var(--text-muted); font-size: 1.1rem;">
                    DASHBOARD
                </a>
                <a href="/settings" class="settings-link" title="Settings" style="text-decoration: none;">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </nav>
        </div>

        <div class="card" style="max-width: 650px; margin: 0 auto 1.5rem auto;">
            <h2 style="margin-top:0;">Appearance</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
                <div>
                    <label style="font-weight: 700; color: var(--text-main);">Dark Mode</label>
                    <p style="margin: 0; font-size: 0.8rem; color: var(--text-muted);">Switch between light and dark themes</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card" style="max-width: 650px; margin: 0 auto;">
            <h2 style="margin-top:0;">Academic Advisor</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem;">
                We suggest <strong>{{ settings[3] }} hours/week</strong>. 
                Status: <span style="color: var(--primary); font-weight: 800;">{{ bracket }}</span>
            </p>
            
            <form action="/settings" method="POST">
                <input type="hidden" name="theme" id="hidden-theme-input" value="{{ settings[0] }}">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Total Credits</label>
                        <input type="number" name="credits" value="{{ settings[1] }}" style="background: var(--card-bg); color: var(--text-main); border: 2px solid var(--border-color); padding: 0.8rem; border-radius: 10px;">
                    </div>
                    <div class="form-group">
                        <label>Study Intensity</label>
                        <select name="intensity" class="input-style" style="padding: 0.8rem; border-radius: 10px; background: var(--card-bg); color: var(--text-main); border: 2px solid var(--border-color);">
                            <option value="Light" {{ 'selected' if settings[2] == 'Light' }}>Light</option>
                            <option value="Standard" {{ 'selected' if settings[2] == 'Standard' }}>Standard</option>
                            <option value="STEM" {{ 'selected' if settings[2] == 'STEM' }}>STEM / Medicine</option>
                            <option value="Finals Week" {{ 'selected' if settings[2] == 'Finals Week' }}>Finals Week</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-save" style="width: 100%; margin-top: 1.5rem;">Update Advisor</button>
            </form>
        </div>
    </div> <script>
        const themeToggle = document.getElementById('theme-toggle');
        const hiddenInput = document.getElementById('hidden-theme-input');
        const htmlEl = document.documentElement;

        // Check preference on load
        if (localStorage.getItem('theme') === 'dark') {
            htmlEl.setAttribute('data-theme', 'oled');
            themeToggle.checked = true;
        }

        // Handle toggle
        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                htmlEl.setAttribute('data-theme', 'oled');
                localStorage.setItem('theme', 'dark');
                hiddenInput.value = 'dark';
            } else {
                htmlEl.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                hiddenInput.value = 'light';
            }
        });
    </script>
</body>
</html>
