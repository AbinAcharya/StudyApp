<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - StudyApp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&display=swap" rel="stylesheet">
</head>
<body class="{{ 'dark-theme' if settings[0] == 'dark' else '' }}">
    <div class="container" style="padding: 2.5rem; position: relative;">
        
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; padding: 1rem 0; border-bottom: 2px solid #e2e8f0;">
            <h1 style="margin: 0; font-family: 'Arimo', sans-serif; font-size: 2.8rem; color: var(--primary);">StudyApp</h1>
            <nav style="display: flex; gap: 2.5rem; margin-top: 0.5rem;">
                <a href="/" style="text-decoration: none; font-weight: 700; color: var(--text-muted);">Tracker</a>
                <a href="/dashboard" style="text-decoration: none; font-weight: 700; color: var(--text-muted);">Dashboard</a>
                <a href="/settings" style="text-decoration: none; font-weight: 700; color: var(--primary);">Settings</a>
            </nav>
        </div>

        <div class="card" style="max-width: 650px; margin: 0 auto;">
            <h2 style="margin-top:0;">Configuration</h2>
            
            <form action="/settings" method="POST">
                <div class="form-group">
                    <label>Theme</label>
                    <select name="theme" class="input-style" style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0;">
                        <option value="light" {{ 'selected' if settings[0] == 'light' }}>☀️ Light Mode</option>
                        <option value="dark" {{ 'selected' if settings[0] == 'dark' }}>🌙 Dark Mode</option>
                    </select>
                </div>

                <div style="background: var(--primary-light); padding: 1.5rem; border-radius: 15px; margin: 1.5rem 0;">
                    <h4 style="margin-top:0; color: var(--primary);">Academic Advisor</h4>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">We suggest <strong>{{ settings[3] }} hours/week</strong>. 
                    Status: <span style="color: var(--primary); font-weight: 800;">{{ bracket }}</span></p>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Total Credits</label>
                            <input type="number" name="credits" value="{{ settings[1] }}">
                        </div>
                        <div class="form-group">
                            <label>Study Intensity</label>
                            <select name="intensity" class="input-style" style="padding: 0.8rem; border-radius: 10px;">
                                <option value="Light" {{ 'selected' if settings[2] == 'Light' }}>Light</option>
                                <option value="Standard" {{ 'selected' if settings[2] == 'Standard' }}>Standard</option>
                                <option value="STEM" {{ 'selected' if settings[2] == 'STEM' }}>STEM / Medicine</option>
                                <option value="Finals Week" {{ 'selected' if settings[2] == 'Finals Week' }}>Finals Week</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-save">Save All Settings</button>
            </form>
        </div>
    </div>
</body>
</html>
