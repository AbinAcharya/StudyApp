<!DOCTYPE html>
<html>
<head>
    <title>Study Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="background: var(--success); color: white; padding: 1rem; border-radius: 12px; text-align: center; margin-bottom: 2rem; font-weight: 700;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <h1 style="text-align: center;">Study Tracker</h1>
        
        <div class="card" style="max-width: 450px; margin: 0 auto;">
            <h3 style="margin-top: 0;">Add Study Session</h3>
            <form action="/" method="POST">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" name="subject" placeholder="e.g. Math" required>
                </div>
                <div class="form-group">
                    <label>Planned Time (minutes)</label>
                    <input type="number" name="planned_time" required>
                </div>
                <div class="form-group">
                    <label>Actual Time (minutes)</label>
                    <input type="number" name="actual_time" required>
                </div>
                <div class="form-group">
                    <label>Understanding (1-5)</label>
                    <input type="number" name="understanding" min="1" max="5" required>
                </div>
                <button type="submit" class="btn-save">Save Session</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/dashboard" style="text-decoration: none; color: var(--primary); font-weight: 700; border: 2px solid var(--primary); padding: 0.8rem 2rem; border-radius: 12px;">View Dashboard</a>
        </div>
    </div>
</body>
</html>
