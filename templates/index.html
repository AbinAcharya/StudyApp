<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&family=Inter:wght@700&display=swap" rel="stylesheet">
</head>
<body style="font-size: 1.15rem; padding: 2.5rem;"> 
    <div class="container">
        
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; padding: 1rem 0; border-bottom: 2px solid #e2e8f0;">
            
            <h1 style="margin: 0; font-family: 'Arimo', sans-serif; font-size: 2.8rem; color: var(--primary); letter-spacing: -1px; padding-bottom: 0.8rem;">
                StudyApp
            </h1>
            
            <nav style="display: flex; gap: 2.5rem; margin-top: 0.5rem;">
                <a href="/" style="text-decoration: none; font-weight: 700; color: var(--primary); font-size: 1.1rem;">
                    Tracker
                </a>
                <a href="/dashboard" style="text-decoration: none; font-weight: 700; color: var(--text-muted); font-size: 1.1rem;">
                    Dashboard
                </a>
            </nav>
        </div>

        <div class="card" style="max-width: 650px; margin: 0 auto; padding: 3rem; border-radius: 25px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
            
            <h2 style="margin-top: 0; margin-bottom: 2.5rem; text-align: left; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.8rem; color: #0f172a; letter-spacing: -0.5px;">
                Study Session Index
            </h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div style="padding: 1.2rem; margin-bottom: 2rem; background: var(--primary-light); color: var(--primary); border-radius: 12px; font-weight: 700; text-align: center;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem;">Subject</label>
                    <input type="text" name="subject" placeholder="e.g. Physics, Coding..." required style="font-size: 1.1rem; padding: 1rem; border-radius: 12px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem;">Planned Time (Minutes)</label>
                    <input type="number" name="planned_time" placeholder="60" required style="font-size: 1.1rem; padding: 1rem; border-radius: 12px;">
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem;">Actual Time (Minutes)</label>
                    <input type="number" name="actual_time" placeholder="45" required style="font-size: 1.1rem; padding: 1rem; border-radius: 12px;">
                </div>

                <div class="form-group" style="margin-bottom: 3rem;">
                    <label style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem;">Understanding (1-5)</label>
                    <input type="number" name="understanding" min="1" max="5" value="3" style="font-size: 1.1rem; padding: 1rem; border-radius: 12px;">
                </div>

                <button type="submit" class="btn-save" style="font-size: 1.25rem; padding: 1.3rem; border-radius: 15px; background-color: #10b981;">Save Session</button>
            </form>
        </div>
    </div>
</body>
</html>
